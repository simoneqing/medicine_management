<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人信息</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="profile">
  <main class="app">
    <header class="topbar card">
      <a class="text-link" href="./index.html">← 返回首页</a>
      <h1>个人信息</h1>
      <p class="muted">体重用于浓度计算：预计提升浓度 = (总剂量 / 体重) × 回收率。</p>
    </header>

    <section class="card">
      <h2>当前体重</h2>
      <p class="conc-value"><span id="profileWeight">--</span> <small>kg</small></p>
      <p class="muted">体重会影响预计提升浓度与相关计算，请保持更新。</p>
    </section>

    <section class="card form-card">
      <h2>体重管理</h2>
      <label for="profileWeightInput">体重（kg）
        <input id="profileWeightInput" type="number" inputmode="decimal" min="0.1" max="300" step="0.1" placeholder="例如：68.5" />
      </label>
      <button id="saveWeightBtn" class="btn-primary" type="button">保存体重</button>
      <p id="profileStatus" class="status-text">请输入 0~300 之间的有效体重值（支持 1 位小数）。</p>
    </section>
  </main>

  <nav class="bottom-nav" id="bottomNav"></nav>
  <script src="./script.js"></script>
</body>
</html>
