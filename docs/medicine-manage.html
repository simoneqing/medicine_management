<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>药品维护</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="medicine-manage">
  <main class="app">
    <header class="topbar card">
      <a class="text-link" href="./index.html">← 返回首页</a>
      <h1>药品维护</h1>
      <p class="muted">同品牌下不同规格共用半衰期、回收率和规格单位（默认 IU）。</p>
    </header>

    <section class="card form-card">
      <h2 id="medicineFormTitle">新增药品</h2>
      <label>品牌名称
        <input id="medBrand" type="text" placeholder="例如：重组人促卵泡激素" />
      </label>
      <label>半衰期（小时）
        <input id="medHalfLife" type="number" min="0.1" step="0.1" placeholder="例如：26" />
      </label>
      <label>回收率
        <input id="medRecoveryRate" type="number" min="0.1" step="0.1" placeholder="例如：2" />
      </label>
      <label>规格单位（默认 IU，可改为 mg/ml）
        <input id="medUnit" type="text" value="IU" placeholder="例如：IU" />
      </label>

      <div>
        <div class="list-head">
          <strong>规格列表（数值）</strong>
          <button class="small-btn" id="addSpecBtn" type="button">+ 新增规格</button>
        </div>
        <div id="specEditorList" class="spec-editor-list"></div>
      </div>

      <p id="medicineStatus" class="status-text">可新增或点击列表“编辑”后更新。</p>
      <div class="inline-actions">
        <button class="btn-primary" id="saveMedicineBtn" type="button">保存</button>
        <button class="btn-secondary" id="resetMedicineBtn" type="button">清空</button>
      </div>
    </section>

    <section class="card">
      <h2>药品列表</h2>
      <div id="medicineList" class="list"></div>
    </section>
  </main>

  <nav class="bottom-nav" id="bottomNav"></nav>
  <script src="./script.js"></script>
</body>
</html>
